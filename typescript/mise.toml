[tasks.install]
run = "bun install"

[tasks.install-frozen]
run = "bun install --frozen-lockfile"

[tasks.check]
depends = ["install-frozen"]
run = "bun run check"

[tasks.typecheck]
depends = ["install-frozen"]
run = "bunx tsc --noEmit"

[tasks.lint]
depends = ["install-frozen"]
run = "bunx biome ci"

[tasks.fmt]
depends = ["install-frozen"]
run = "bun run fmt"

[tasks.example-prompt-eval]
depends = ["install-frozen"]
run = "qt run support-triage -- bun run examples/prompt_eval.ts"

[tasks.ci]
run = [
    "bun install --frozen-lockfile",
    "mise run ci-checks"
]

[tasks.ci-checks]
depends = ["typecheck", "lint"]

# requires that the CLI is installed already
[tasks.e2e]
depends = ["install-frozen"]
run = [
    "qt run --input '{\"iterations\": 3}' e2e-smoke-ts -- bunx tsx tests/e2e/smoke.ts"
    # TODO: check output
]

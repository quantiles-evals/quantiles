[benchmarks.nocode_custom]
type = "custom_nocode"
style = "qa"
dataset = "quantiles/simpleqa-verified"
model = "random"
prompt_template_file = "prompts/qa.txt"
golden_column = "answer"
limit = 10

[benchmarks.medqa]
type = "custom_nocode"
style = "qa"
dataset = "GBaker/MedQA-USMLE-4-options"
dataset_config = "default"
split = "test"
model = "random"
prompt_template_file = "prompts/medqa.txt"
choices_column = "options"
choice_labels = ["A", "B", "C", "D"]
golden_column = "answer_idx"
limit = 10

[benchmarks.medmcqa]
type = "custom_nocode"
style = "qa"
dataset = "openlifescienceai/medmcqa"
dataset_config = "default"
split = "test"
model = "random"
prompt_template_file = "prompts/medmcqa.txt"
choice_columns = ["opa", "opb", "opc", "opd"]
choice_labels = ["A", "B", "C", "D"]
golden_index_column = "cop"
golden_index_base = 0
limit = 10

[benchmarks.mmlu-pro]
type = "custom_nocode"
style = "qa"
dataset = "TIGER-Lab/MMLU-Pro"
dataset_config = "default"
split = "test"
model = "random"
prompt_template_file = "prompts/mmlu-pro.txt"
choices_column = "options"
choice_labels = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J"]
golden_column = "answer"
limit = 10

[benchmarks.gpqa]
type = "custom_nocode"
style = "qa"
dataset = "Wanfq/gpqa"
dataset_config = "gpqa_diamond"
split = "train"
model = "random"
prompt_template_file = "prompts/gpqa.txt"
choice_columns = ["Correct Answer", "Incorrect Answer 1", "Incorrect Answer 2", "Incorrect Answer 3"]
choice_labels = ["A", "B", "C", "D"]
correct_choice_column = "Correct Answer"
shuffle_choices = true
shuffle_seed_column = "Record ID"
limit = 10

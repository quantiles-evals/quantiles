[tools]
zig = "0.16.0"
shellcheck = "latest"

[tasks.build]
run="cargo build"

[tasks.check]
run="cargo check"

# run _all_ tests for the CLI (including integration tests)
[tasks.test]
run="cargo test"

# run just integration tests for the CLI
[tasks.test-integration]
run="cargo test --test cli_golden_path"

# format the CLI
[tasks.fmt]
run="cargo fmt"

# check to make sure the CLI is formatted properly
[tasks.fmt-check]
run = "cargo fmt --check"

# lint the CLI
[tasks.lint]
run="cargo clippy --all-targets --all-features -- -D warnings"

# install the CLI to ~/.local/bin
[tasks.install]
run = [
    "mkdir -p \"${HOME}/.local/bin\"",
    "cargo build",
    "cp ./target/debug/qt \"${HOME}/.quantiles/bin\""
]

# run a rust example that proves the raw rust HTTP client works
[tasks.run-http-client-example]
run="cargo run --example http_client"

# dispatch the GitHub Actions release workflow, which builds the CLI for all
# supported macOS and Linux targets and publishes the release artifacts to R2
[tasks.publish-cli-r2]
run="gh workflow run cli-release.yml"

# lint shell scripts
[tasks.shellcheck]
run="shellcheck scripts/*.sh"

# run rust checks sequentially
[tasks.ci-rust]
run = [
    "cargo fmt --check",
    "cargo clippy --all-targets --all-features -- -D warnings",
    "cargo test",
]

# run all CI checks (shellcheck in parallel with rust checks)
[tasks.ci]
depends = ["ci-rust", "shellcheck"]
run="echo 'All CI checks passed'"

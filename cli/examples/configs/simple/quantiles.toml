# This config file sets up the PubMedQA and SimpleQA-verified benchmarks to use the built-in
# demo model. The `qt` CLI automatically detects this file in the current working directory.
#
# This built-in demo model generates random text and is generally only useful only for smoke
# testing purposes. Do not use results from these runs to determine the quality of any model.
#
# Each section under [benchmarks.<name>] maps to a builtin eval. The `samples` key limits the
# number of dataset rows processed.

[benchmarks.pubmedqa]
dataset = "hf://quantiles/PubMedQA"
samples = 10

[benchmarks.simpleqa-verified]
dataset = "hf://quantiles/simpleqa-verified"
samples = 100

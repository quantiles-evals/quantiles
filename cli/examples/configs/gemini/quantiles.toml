# This config file sets up PubMedQA to use the Gemini API.
#
# The PubMedQA benchmark reads the Gemini API key from the `GEMINI_API_KEY` environment
# variable. Learn more about the Gemini API in Google's Gemini AI Studio:
#
# https://aistudio.google.com/prompts/new_chat

[benchmarks.pubmedqa]
# The full expert-labeled PubMedQA benchmark has 1,000 samples. Because Google charges for
# usage, this example limits the run to 50 samples to control costs. Omit `samples` to run the
# full benchmark.
samples = 50

# This example uses a relatively low-cost, fast model. Model details are available at:
#
# https://ai.google.dev/gemini-api/docs/models/gemini-3.1-flash-lite
#
# That page also lists other Google models you can use.
model = "gemini:gemini-3.1-flash-lite"

# If you run this or other benchmarks with more samples, you may need to increase
# `max_workers` to improve throughput. Higher concurrency may trigger Google rate limits.
#
# See the following rate limit and quota page for more information:
#
# https://aistudio.google.com/rate-limit
max_workers = 10

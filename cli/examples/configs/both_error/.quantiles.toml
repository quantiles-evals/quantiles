# Example Quantiles workspace configuration.
#
# Place this file in your working directory as either:
#   - quantiles.toml
#   - .quantiles.toml
#
# If both files exist in the same directory, the CLI will error to avoid
# ambiguity.
#
# Each section under [benchmarks.<name>] maps to a builtin eval.
# The `samples` key limits the number of dataset rows processed.

[benchmarks.pubmedqa]
samples = 10

[benchmarks.simpleqa-verified]
samples = 100

[benchmarks.financebench]
samples = 50

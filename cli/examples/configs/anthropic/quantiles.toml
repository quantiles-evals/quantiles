# This config file sets up PubMedQA to use an Anthropic Claude model.
#
# The PubMedQA benchmark reads the API key from the `ANTHROPIC_API_KEY` environment
# variable. To get an API key, go to https://platform.claude.com/settings/workspaces/default/keys

[benchmarks.pubmedqa]
dataset = "hf://quantiles/PubMedQA"

# The full expert-labeled PubMedQA benchmark has 1,000 samples. Because Anthropic charges for
# usage, this configuration entry limits the run to 50 samples to control costs.
#
# Omit the below `samples` key to run the full benchmark.
samples = 50

# This example uses a relatively low-cost, fast model. Model details are available at:
#
# https://platform.claude.com/docs/en/about-claude/models/overview#latest-models-comparison
#
# That page also has a list of other Anthropic models that you can use.
model = "anthropic:claude-haiku-4-5-20251001"

# If you run this or other benchmarks with more samples, you may need to increase
# `max_workers` to improve throughput. Higher concurrency may trigger Anthropic rate limits.
#
# If this happens, you may need to upgrade your rate limit tier on this page:
#
# https://platform.claude.com/settings/limits
#
# You can also see your usage at https://platform.claude.com/usage
max_workers = 5

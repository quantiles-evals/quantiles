# This config file sets up PubMedQA to use Cloudflare AI Gateway.
#
# The PubMedQA benchmark reads the Cloudflare account ID, gateway ID, and API key
# from the following environment variables:
#
# - CLOUDFLARE_ACCOUNT_ID
# - CLOUDFLARE_GATEWAY_ID
# - CLOUDFLARE_API_KEY
#
# To get your account ID, gateway ID, and API key, go to your Cloudflare AI Gateway dashboard at:
#
# https://dash.cloudflare.com/<account_id>/ai/ai-gateway

[benchmarks.pubmedqa]
dataset = "hf://quantiles/PubMedQA"

# The full expert-labeled PubMedQA benchmark has 1,000 samples. Because Cloudflare charges for
# usage, this example limits the run to 50 samples to control costs. Omit `samples` to run the
# full benchmark.
samples = 50

# This example uses a fast, non-reasoning model. Model details are available at:
#
# https://developers.cloudflare.com/ai/models/@cf/meta/llama-3.3-70b-instruct-fp8-fast/
#
# A list of all models is available at:
#
# https://developers.cloudflare.com/workers-ai/models/
model = "cloudflare_ai_gateway:@cf/meta/llama-3.3-70b-instruct-fp8-fast"

# If you don't want to specify your account ID and gateway ID in environment variables
# (CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_GATEWAY_ID, respectively), you can provide them
# alongside the model in a TOML table as shown below:
#
# model = {
#   type = "cloudflare_ai_gateway:@cf/meta/llama-3.3-70b-instruct-fp8-fast",
#   account_id = "...",
#   gateway_id = "..."
# }
#
# Note that if you do this, you will still need to provide the API key in the
# CLOUDFLARE_API_KEY environment variable.

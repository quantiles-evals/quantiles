# This config file sets up PubMedQA to use the OpenAI API.
#
# The PubMedQA benchmark reads the OpenAI API key from the `OPENAI_API_KEY` environment variable.
#
# Learn more about the OpenAI API at:
#
# https://platform.openai.com/home

[benchmarks.pubmedqa]
# The full expert-labeled PubMedQA benchmark has 1,000 samples. Because OpenAI charges for
# usage, this example limits the run to 50 samples to control costs. Omit `samples` to run the
# full benchmark.
samples = 50

# You may need to ensure that the project associated with your API key has permission to use
# the configured model. Manage model access on the following page:
#
# https://platform.openai.com/settings/$PROJECT_ID/limits
#
# A list of available models is available at:
#
# https://developers.openai.com/api/docs/models/all
model = "openai:gpt-5.6"

# If you run this or other benchmarks with more samples, you may need to increase
# `max_workers` to improve throughput. Higher concurrency may trigger rate limits. Adjust
# model limits at https://platform.openai.com/settings/$PROJECT_ID/limits if needed.
max_workers = 100

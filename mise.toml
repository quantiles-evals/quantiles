monorepo_root = true

[monorepo]
config_roots = [".", "cli", "typescript", "python", "python-examples"]

[tools]
# keep this version inline with the version declared in .github/workflows/typescript
bun = "1.3.14"
# keep this version inline with rust stable
rust = "1.96.0"
# keep this version inline with the version declared in .github/workflows/python
uv = "0.11.21"

[tasks.run-custom-nocode]
description = "Run all configured no-code benchmarks with the random model"
dir = "custom-nocode-examples"
run = '''
aggregate_exit=0

for benchmark in nocode_custom medqa medmcqa mmlu-pro gpqa; do
  printf '\n===== %s =====\n' "$benchmark"
  if qt run "$benchmark"; then
    printf '===== %s: PASS =====\n' "$benchmark"
  else
    exit_code=$?
    printf '===== %s: FAIL (exit %s) =====\n' "$benchmark" "$exit_code"
    aggregate_exit=1
  fi
done

exit "$aggregate_exit"
'''

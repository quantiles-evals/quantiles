name: typescript-sdk

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: ci
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # https://bun.com/docs/guides/runtime/cicd
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: jdx/mise-action@v2
        with:
          version: 2026.6.11
      - name: run-ci
        run: mise //typescript:ci
